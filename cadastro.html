<!DOCTYPE html>
<html lang="pt-Br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadastro - Apex Games Store</title>
    </head>
    <body>
        <main class="cadastro-container">
            <form id="form-cadastro">
            <h1>Cadastro Apex Games</h1>

        <div class="cadastro">
            <input id="nome" type="text" placeholder="Nome Completo" required>
            <i class="bx bx-user"></i>
        </div>

        <div class="cadastro">
            <input id="email" type="email" placeholder="Email" required>
            <i class="bx bx-envelope"></i>
        </div>

        <div class="cadastro">
            <input id="telefone" type="tel" placeholder="Telefone" required>
            <i class="bx bx-phone"></i>
        </div>

        <div class="cadastro">
            <input id="senha" type="password" placeholder="Senha" required>
            <i class="bx bx-lock"></i>
        </div>

        <div class="cadastro">
            <input id="confirmar-senha" type="password" placeholder="Confirmar Senha" required>
            <i class="bx bx-lock"></i>
        </div>

        <button class="vai" type="submit">Cadastrar</button>
        <a href="index.html" class="fecha">Fechar</a>
    </form>
    </main>
    <script src="cadastro.js"></script>
</body>
</html>
